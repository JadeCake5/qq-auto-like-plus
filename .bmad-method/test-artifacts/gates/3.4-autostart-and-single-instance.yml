findings:
  p1: 0
  p2: 0
  p3: 2
  p4: 1
  details:
    - id: P3-F1
      severity: P3
      type: consistency
      description: |
        enable_autostart 和 disable_autostart 修改 config 表后未 emit config:updated 事件。
        update_config command (settings.rs:34) 统一 emit 该事件通知前端，但 autostart commands 跳过了。
        前端主动调用所以功能不受影响，但破坏了 config 变更通知的一致性模式。
      location: "settings.rs:59-80"
      recommendation: |
        在 enable_autostart 和 disable_autostart 的 upsert_config 之后添加：
        let _ = app.emit("config:updated", "auto_start");
        建议在 Story 4.3（设置面板）实现时一并补充。
    - id: P3-F2
      severity: P3
      type: atomicity
      description: |
        enable_autostart 先调用 autolaunch().enable()（写 Windows 注册表），再 upsert_config（写 DB）。
        若 DB 写入失败，OS 注册表已变更但 command 返回 Err，导致 OS 状态与 DB 状态不一致。
        概率极低（仅 DB 损坏/poisoned mutex 场景），但不符合严格的原子操作模式。
      location: "settings.rs:63-65 (enable), settings.rs:75-77 (disable)"
      recommendation: |
        方案A：反转顺序，先写 DB 再写注册表（DB 失败不影响 OS，注册表失败可回滚 DB）。
        方案B：保持现状，概率极低且 is_autostart_enabled 读的是 OS 真实状态，可自修正。
        推荐方案B（当前已足够），仅记录技术债。
    - id: P4-F1
      severity: P4
      type: pre-existing
      description: "9 个 cargo warnings 全为已有代码的未使用导入/函数，非本 Story 引入"
      location: "engine/mod.rs, config/mod.rs, db/models.rs, engine/quota.rs"
      recommendation: "后续 Story 可批量清理"

