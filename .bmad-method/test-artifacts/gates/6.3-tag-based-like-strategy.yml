advisory_items:
  - id: P3-F1
    severity: low
    location: "friends/strategy.rs:43"
    description: |
      `.unwrap()` on `min_by_key()` result — guarded by `if friend.tags.is_empty()`
      early return so logically safe, but architecture rule states
      "禁止 unwrap()/expect() 在生产代码". Defensive alternative:
      `if let Some(best_tag) = ...` or `.expect("tags guaranteed non-empty")` with
      comment.
    recommendation: "Replace with `if let Some` or add comment justifying safety"
    blocking: false

  - id: P3-F2
    severity: low
    location: "engine/reply_handler.rs:62,144"
    description: |
      `resolve_friend_strategy()` called with `default_times=0` as placeholder,
      then `tag_like_times > 0` used as sentinel check to decide tag override vs
      global config. Relies on validation ensuring like_times ∈ [1,20], making 0
      a safe sentinel. Pattern is fragile if validation range changes later.
    recommendation: |
      Consider returning `Option<i32>` from the tag strategy check instead of
      using 0 as sentinel. Lower priority since validation guarantees [1,20].
    blocking: false

