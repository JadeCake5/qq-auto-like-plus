# Issues Summary
issues:
  high: 0
  medium: 1
  low: 3

medium_issues:
  - id: M1
    title: "call_api 中 HTTP 4xx 和 Deserialize 错误未记录 tracing::error! 日志"
    file: "onebot/client.rs:48-59, 63-65"
    blocking: false
    recommendation: |
      AC#7 要求 "error 级别失败"。两个 early return 路径跳过了 tracing::error!：
      1. HTTP 4xx (client.rs:59): return Err(err) 无日志
      2. Deserialize (client.rs:63-65): ? 操作符直接返回
      风险低（localhost OneBot 不应产生 4xx；Deserialize 极少），但建议补全：
      在两处 return 前添加 tracing::error! 以保持日志完整性。

low_issues:
  - id: L1
    title: "FriendInfo.remark 的 alias = 'remark' 冗余"
    file: "onebot/types.rs:45"
    blocking: false
    recommendation: |
      rename_all = "camelCase" 对单词 remark 无变换，alias 与主键相同。
      default 属性有用，alias 仅冗余。可移除 alias 保持简洁。
  - id: L2
    title: "OneBotClient 未实现 Clone"
    file: "onebot/client.rs:11"
    blocking: false
    recommendation: |
      Story 2.3 引擎可能需要共享客户端。reqwest::Client 内部使用 Arc，
      添加 Clone derive 是零成本的。建议 Story 2.3 按需添加。
  - id: L3
    title: "重试日志未说明触发重试的原因"
    file: "onebot/client.rs:39"
    blocking: false
    recommendation: |
      当前重试日志 "重试 OneBot API {}: 第 {} 次" 未包含 last_error 信息。
      建议增加错误摘要方便生产环境定位问题。

