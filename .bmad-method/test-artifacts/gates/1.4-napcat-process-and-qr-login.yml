# Issues Summary
issues:
  high: 0
  medium: 3
  low: 5

medium_issues:
  - id: M1
    title: "后台任务缺乏取消机制 — stop 后轮询/监控继续空跑"
    file: "napcat/process.rs:152-172"
    blocking: false
    recommendation: |
      poll_login_status 使用 tokio::select! + CancellationToken 在 stop 时终止。
      monitor_qr_file 使用 AtomicBool 标记停止。当前 stop_napcat 仅 kill 子进程、
      不通知后台任务。登录轮询最长空跑 5 分钟持续请求不存在的 HTTP 服务。
      建议 Sprint 2 引入 tokio_util::sync::CancellationToken 统一管理。
  - id: M2
    title: "get_login_info_cmd 未检查 OneBot status 字段"
    file: "commands/napcat.rs:107-114"
    blocking: false
    recommendation: |
      poll_login_status 正确检查了 body["status"] == "ok"，但 get_login_info_cmd
      直接访问 body["data"]["user_id"]。若 NapCat 返回错误响应（status != "ok"），
      将返回 qq_number="0"、nickname="" 的无效 LoginInfo。
      修复：添加 status 检查，非 "ok" 时返回 Err。
  - id: M3
    title: "配置文件名 onebot11.json 可能不被 NapCat 识别"
    file: "napcat/config.rs:49"
    blocking: false
    recommendation: |
      NapCat 期望配置文件名为 onebot11_{qq号}.json。首次启动时无 QQ 号，可考虑：
      1. 使用通配符模式（如 onebot11_default.json）
      2. 登录成功后重命名配置文件
      3. 验证 NapCat 是否接受无 QQ 号后缀的配置文件
      需要实际运行时验证。

low_issues:
  - id: L1
    title: "api_port 在 start_napcat 和 generate_napcat_config 中重复读取"
    file: "commands/napcat.rs:47-53, napcat/config.rs:11-17"
    blocking: false
    recommendation: "generate_napcat_config 应接受 port 参数，避免两次独立读取可能不一致"
  - id: L2
    title: "spawn_blocking 用于长时间阻塞任务（stdout/stderr/QR监控）"
    file: "napcat/process.rs:117-154"
    blocking: false
    recommendation: |
      spawn_blocking 设计用于短暂阻塞操作。stdout/stderr 读取和 QR 文件监控是
      长时间运行任务，应使用 std::thread::spawn 避免占用 tokio blocking pool。
      桌面单用户场景影响有限，但从正确性角度建议改用独立线程。
  - id: L3
    title: "QR 文件监控仅检测一次即返回，二维码过期刷新后无法再次检测"
    file: "napcat/process.rs:202"
    blocking: false
    recommendation: "找到二维码后应继续监控，或在超时后重新进入循环"
  - id: L4
    title: "WaitingForLogin 状态在轮询开始时即 emit，而非 API 真正就绪时"
    file: "napcat/process.rs:221-225"
    blocking: false
    recommendation: |
      当前在 poll_login_status 入口就 emit WaitingForLogin，但此时 NapCat API
      可能尚未启动。更准确的做法是在首次成功连接 API 后才 emit WaitingForLogin。
  - id: L5
    title: "Capabilities 未添加 shell:allow-spawn（与 Dev Notes 描述不一致）"
    file: "src-tauri/capabilities/default.json"
    blocking: false
    recommendation: |
      Dev 选择 std::process::Command 替代 tauri_plugin_shell，因此实际不需要
      额外 shell 权限。这是正确的，但 Dev Notes 中仍建议添加 shell:allow-spawn，
      建议更新 Dev Notes 说明实际方案以避免后续维护者困惑。

# Risk Assessment
risk_level: LOW-MEDIUM
risk_factors:
  - "后台任务无取消机制，stop 后资源浪费（M1）"
  - "配置文件名不确定是否被 NapCat 正确识别（M3，需运行时验证）"
  - "进程管理使用 std::process 而非 tauri_plugin_shell（合理偏差，但绕过 Tauri 沙箱）"
  - "运行时端到端验证缺失（继承自 Story 1.2 M3，需实际 NapCat 环境验证）"

# Code Quality
code_quality:
  correctness: 8
  architecture: 9
  security: 8
  maintainability: 8
  test_readiness: 7

# Noted Deviations
deviations:
  - id: D1
    title: "使用 std::process::Command 替代 tauri_plugin_shell"
    rationale: |
      Dev 在 Completion Notes 中说明：避免 Tauri shell 插件复杂权限配置
      （Story 1.1 QA 已移除 shell:allow-execute），无需额外 capabilities。
      且直接 node.exe 启动可确保 kill() 正确终止目标进程（bat 包装层会导致
      cmd.exe 被 kill 而实际 NapCat 进程残留）。
    verdict: ACCEPTABLE

# Recommendation
recommendation: |
  PROCEED to Sprint 2 / Epic 2。建议修复优先级：
  - M2 (立即): commands/napcat.rs 添加 OneBot status 检查，防止返回无效数据
  - M3 (验证): 实际运行 NapCat 验证 onebot11.json 是否被识别，不识别则修改命名
  - M1 (Sprint 2): 引入 CancellationToken 统一后台任务生命周期管理
  - L1-L5: 可在 Sprint 2 优化批次中统一处理
