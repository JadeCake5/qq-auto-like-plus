findings:
  p1: 0
  p2: 0
  p3: 1
  p4: 2
  details:
    - id: P3-F1
      severity: P3
      type: consistency
      description: |
        Stores 直接调用 invoke() 而非复用 src/lib/tauri.ts 封装函数。
        例如 useNapCatStore.ts:21 用 invoke<NapCatStatus>("get_napcat_status")
        而非已有的 getNapCatStatus()；useSettingsStore.ts:16 用 invoke<ConfigEntry[]>("get_config")
        而非 getConfig()。src/lib/tauri.ts 已封装 7 个 command 函数，stores 未利用。
        功能不受影响，但违反 DRY 原则，未来 command 名变更需要多处修改。
      location: "useNapCatStore.ts:21,29; useSettingsStore.ts:16,25; useLikeStore.ts:39,48"
      recommendation: |
        在后续 Story（如 4.2/4.3 填充页面逻辑时）一并重构，将 store 的 invoke 调用
        替换为 tauri.ts 封装函数。也可在 tauri.ts 中补充缺失的 getDailyStats /
        getEngineStatus 封装。低优先级，不阻塞。
    - id: P4-F1
      severity: P4
      type: scalability
      description: |
        useLogStore.addEntry 使用 [...state.entries, entry] 无限追加，无上限控制。
        长时间运行可能积累大量日志条目消耗内存。
      location: "useLogStore.ts:24-25"
      recommendation: |
        Story 4.4（日志页面）实现时添加 maxEntries 限制（如 1000 条，FIFO 淘汰）。
        当前作为占位 store 可接受。
    - id: P4-F2
      severity: P4
      type: ux
      description: |
        StatusBar 错误状态仅显示"错误"二字，未展示 NapCatStatus.error 的具体信息。
        { error: string } variant 的 error 字段被忽略。
      location: "StatusBar.tsx:22"
      recommendation: |
        可改为 getStatusText 返回 `错误: ${status.error}` 并 truncate 长度。
        低优先级，Story 4.2 仪表盘可提供更详细的错误展示。

