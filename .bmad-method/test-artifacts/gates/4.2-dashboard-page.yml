findings:
  p1: 0
  p2: 1
  p3: 2
  p4: 2
  details:
    - id: P2-F1
      severity: P2
      type: robustness
      description: |
        进度条除零风险。Dashboard.tsx:229 计算 `(batchProgress.current / batchProgress.total) * 100`，
        若 batchProgress.total 为 0 则产生 NaN，CSS width 变为 "NaN%" 导致进度条渲染异常。
        虽然实际场景中 total 不太可能为 0（批量点赞至少有 1 个目标），但防御性编程应当处理。
      location: "Dashboard.tsx:229"
      recommendation: |
        改为 `Math.max(batchProgress.total, 1)` 作分母，或添加 total > 0 的 guard：
        `width: \`${batchProgress.total > 0 ? (batchProgress.current / batchProgress.total) * 100 : 0}%\``
    - id: P3-F1
      severity: P3
      type: consistency
      description: |
        Dashboard 直接调用 invoke() 而非使用本 Story 新增的 tauri.ts 封装函数。
        handleStartBatch 用 invoke("start_batch_like") 而非 startBatchLike()；
        handleTogglePause 用 invoke("pause_engine")/invoke("resume_engine") 而非 pauseEngine()/resumeEngine()。
        tauri.ts 中新增的 6 个封装函数 (startBatchLike/pauseEngine/resumeEngine/getEngineStatus/
        getNextRunTime/getDailyStats) 未被任何模块引用，属于死代码。
        同时延续了 Story 4.1 P3-F1 的 stores 直接 invoke 问题。
      location: "Dashboard.tsx:67,78,79; useLikeStore.ts:39,48; tauri.ts:43-65 (unused)"
      recommendation: |
        将 Dashboard.tsx 和 stores 中的 invoke 调用替换为 tauri.ts 封装函数。
        统一入口便于未来 command 名称变更或添加全局错误处理。
        可在 Story 4.3 统一修复。
    - id: P3-F2
      severity: P3
      type: completeness
      description: |
        AC #8 原文 "NapCat 连接状态实时显示（已连接/断开/重连中）"，但实现仅区分
        "已连接"/"未连接" 两种状态。NapCatStatus 的 "starting" 状态可映射为 "重连中"，
        当前被归入 "未连接" 类别。
      location: "Dashboard.tsx:203-210"
      recommendation: |
        可扩展状态映射：running→已连接, starting→重连中, 其他→未连接。
        低优先级，不影响核心功能。
    - id: P4-F1
      severity: P4
      type: ux
      description: |
        首次加载时 dailyStats 为 null 且 isRunning 为 false，空状态判断
        `!dailyStats && !isRunning` 为 true，会短暂闪现空状态界面，直到
        fetchDailyStats 返回数据后切换到正常视图。
      location: "Dashboard.tsx:99"
      recommendation: |
        可添加 loading 状态或骨架屏，或在 fetchDailyStats 未完成前不渲染空状态。
        影响极小（<100ms 闪烁），低优先级。
    - id: P4-F2
      severity: P4
      type: performance
      description: |
        Dashboard 调用 useLikeStore() 无 selector，订阅整个 store。
        任何 store 字段变更（包括不相关的 lastBatchResult）都触发重渲染。
        考虑到已有 1 秒 tick interval 驱动重渲染，额外重渲染影响可忽略。
      location: "Dashboard.tsx:33-41"
      recommendation: |
        如后续发现性能问题，可改为选择性订阅：
        `const { dailyStats, isRunning, ... } = useLikeStore(useShallow(s => ({ ... })))`
        当前可接受。

