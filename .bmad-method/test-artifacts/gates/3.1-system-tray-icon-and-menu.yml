# QA Gate Decision
# Story: 3.1 - 系统托盘基础（图标与右键菜单）
# Generated: 2026-03-14

story_id: "3.1"
story_title: "系统托盘基础（图标与右键菜单）"
epic: "Epic 3: 系统托盘、后台运行与进程管理"
reviewer: "Quinn (Test Architect) — Claude Opus 4.6"
review_date: "2026-03-14"

# Gate Decision: PASS | CONCERNS | FAIL | WAIVED
gate_decision: CONCERNS

decision_rationale: |
  Story 3.1 实现正确，7 项 AC 全部通过验证。

  核心托盘实现质量良好：
  - TrayIconBuilder::with_id("main-tray") 创建托盘，后续可通过 ID 精确获取
  - include_bytes! 嵌入 32x32 PNG 图标，打包后不依赖文件系统
  - build_tray_menu 创建 5 项菜单，napcat_status 设为 disabled 仅展示文字
  - handle_menu_event 正确分发 5 个菜单项事件
  - pause/resume 签名差异（&ref vs owned clone）处理正确
  - BatchLikeRunning AtomicBool swap 模式正确复用防止重复触发
  - tokio::spawn 正确桥接 sync→async 上下文
  - 互斥锁中毒恢复（quit handler e.into_inner()）处理得当

  事件监听实现完整：
  - napcat:status-changed 使用 resolve_tray_state() 正确组合状态
  - engine:status-changed 更新暂停/恢复菜单文字

  给出 CONCERNS 而非 PASS 的原因：
  1 个 Medium issue — engine:status-changed 监听器绕过 resolve_tray_state()
  直接设置 TrayState，可导致 NapCat Error 状态被错误覆盖为绿色。
  虽为边缘场景且可自愈（下次 napcat 事件修正），但涉及用户可见的
  状态不一致。建议在 Story 3.3（健康检查）中统一状态同步机制。

