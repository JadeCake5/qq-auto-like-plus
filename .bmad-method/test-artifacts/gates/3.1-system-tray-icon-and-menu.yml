# Issues Summary
issues:
  high: 0
  medium: 1
  low: 2

medium_issues:
  - id: M1
    title: "engine:status-changed 监听器未考虑 NapCat 状态"
    file: "lib.rs:164-168"
    blocking: false
    description: |
      engine 状态变化时直接根据 is_paused 设置 TrayState：
        暂停 → Pending(黄)
        运行 → Running(绿)
      未查询当前 NapCat 状态。若 NapCat 处于 Error（红），
      engine resume 会错误地将图标切为绿色，直到下一次
      napcat:status-changed 事件触发才会修正。
    recommendation: |
      方案 A（推荐）：在 engine handler 中也获取 NapCat 状态，
      使用 resolve_tray_state() 统一判断：
        let napcat_status = /* 从 State 或缓存获取 */;
        let tray_state = resolve_tray_state(&napcat_status, engine_status.is_paused);

      方案 B：延迟到 Story 3.3 中引入集中式状态管理器，
      所有状态变化通过统一入口更新托盘。

low_issues:
  - id: L1
    title: "engine:status-changed 覆盖 NapCat 状态文字"
    file: "lib.rs:152-159"
    blocking: false
    description: |
      engine handler 将 napcat_status 菜单项文字设为 "引擎: 已暂停/运行中"，
      覆盖了 napcat handler 设置的 "运行环境: XXX"。
      菜单项本意是展示 NapCat 状态，现混入了引擎状态。
    recommendation: |
      建议分离展示：仅在 napcat_status 菜单项展示 NapCat 状态，
      引擎暂停信息通过 toggle_pause 菜单项文字（恢复/暂停）体现即可。
      或增加一个独立的引擎状态菜单项。
  - id: L2
    title: "update 函数在 tray 不存在时静默成功"
    file: "tray/mod.rs:166, 189"
    blocking: false
    description: |
      update_tray_icon/update_tray_menu 中 tray_by_id("main-tray") 返回 None
      时函数直接返回 Ok(())，无任何日志输出。在 tray 创建失败的异常场景下
      难以诊断问题。
    recommendation: |
      添加 tracing::warn!("托盘图标 main-tray 未找到，跳过更新")。

