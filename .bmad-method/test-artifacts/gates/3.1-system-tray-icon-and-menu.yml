# Noted Deviations
deviations:
  - description: |
      Story spec Dev Notes 建议使用重建菜单方式（方式一）更新暂停/恢复文字。
      实现完全遵循此建议，使用 update_tray_menu 每次重建完整菜单。
      5 项菜单开销可忽略，设计合理。
    acceptable: true
  - description: |
      EngineStatus 添加了 Deserialize derive，超出 Story 3.1 的文件修改范围。
      这是为了支持 engine:status-changed 事件 payload 反序列化，
      是实现 AC#6（事件驱动更新）的必要修改，属于合理扩展。
    acceptable: true

# Recommendation
recommendation: |
  Story 3.1 可以交付（CONCERNS 非阻塞）。建议：
  1. 将 story 状态更新为 done
  2. M1 作为 Story 3.3 的前置任务，在健康检查机制中引入集中式状态管理
  3. L1/L2 记录到技术债清单，可在后续迭代渐进修复
  4. 用户需手动运行 pnpm tauri dev 验证 Task 6.2（托盘图标可见性）
