  details:
    - id: P2-F1
      severity: P2
      type: bug
      description: |
        restart_napcat_internal 调用 start_napcat_process，后者内部 spawn poll_login_status → start_health_check。
        这意味着从健康检查循环内触发重启后，原循环继续运行 + 新循环被 spawn。
        每次成功重启都会叠加一个新的健康检查循环。3次重启后可能有4个并发健康检查同时运行，
        可能导致重复检测、重复重启、资源浪费。
      location: "process.rs:489 (start_napcat_process 传入 onebot → 内部 spawn 新 health check)"
      recommendation: |
        方案A：重启后 break 当前健康检查循环，让新 spawn 的接管。
        方案B：给 start_napcat_process 添加 skip_health_check 参数，重启场景下不 spawn 新循环。
        方案C：使用 CancellationToken 在重启时取消旧循环。
        推荐方案A（最简单）：restart 成功后 break，新 start_napcat_process 自然会 spawn 新的 health check。
    - id: P2-F2
      severity: P2
      type: bug
      description: |
        restart_count 在重启成功后重置为 0（line 416），但新 spawn 的健康检查也以 restart_count=0 开始。
        两个循环各自独立维护计数器，叠加效果下实际最多可尝试 6 次重启（每个循环各 3 次）。
        与 P2-F1 耦合——解决 P2-F1 后此问题自然消除。
      location: "process.rs:416 + 332"
      recommendation: "随 P2-F1 一并修复"
    - id: P2-F3
      severity: P2
      type: gap
      description: |
        AC #6 明确写了 "user_id=0 或 QQ 号与已保存不同" 两个条件。
        实现只检查了 user_id==0，缺少 QQ 号变更检测（被顶号/30天强制重登换号场景）。
        Task 5.3 标注为可选，但 AC 未标注可选，存在规格歧义。
      location: "process.rs:343-375"
      recommendation: |
        若确认为可选：更新 AC #6 移除 "或 QQ 号与已保存不同" 条件，保持文档一致。
        若需实现：从 db config 读取 qq_number 与 info.user_id 对比，不匹配时触发掉线流程。
    - id: P3-F1
      severity: P3
      type: code-quality
      description: |
        db.lock().map_err(|e| e.into_inner()) 语义不正确——将 PoisonError 转为 Err(MutexGuard)，
        然后 if let Ok(conn) 只处理 Ok 分支。Err 分支丢弃了可用的 guard。
        其他位置（382-384行）正确使用 match + into_inner() 恢复 poisoned mutex。
      location: "process.rs:368"
      recommendation: "改为 match db.lock() { Ok(g) => g, Err(e) => e.into_inner() } 统一模式"
    - id: P3-F2
      severity: P3
      type: dead-code
      description: "api_base_url() 方法未被使用，cargo check 产生 warning"
      location: "process.rs:51-53"
      recommendation: "当前无调用方，建议移除或添加 #[allow(dead_code)] 注释说明预留用途"
    - id: P3-F3
      severity: P3
      type: edge-case
      description: |
        健康检查循环在 API 不通但进程存活时仅记录 warn 日志（line 390），没有计数或超时机制。
        若 NapCat 进入僵死状态（进程活着但永远不响应），健康检查会无限 warn 而不采取行动。
      location: "process.rs:389-390"
      recommendation: "可添加连续 API 失败计数器，超过阈值（如 10 次 = 5 分钟）时强制重启"
    - id: P4-F1
      severity: P4
      type: pre-existing
      description: "get_login_info_cmd 创建新 reqwest::Client 而非复用 OneBotClient State（非本 Story 引入）"
      location: "commands/napcat.rs:97"
      recommendation: "后续 Story 可优化为注入 OneBotClientState"

