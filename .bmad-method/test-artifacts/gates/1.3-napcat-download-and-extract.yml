# Recommendation
recommendation: |
  PROCEED to Story 1.4。建议优先修复 M1（一行代码变更），M2/M3 可延后：
  - M1 (优先): downloader.rs:17 后添加 `.error_for_status()?`，防止 404/5xx 静默失败
  - M2 (Sprint 2): 引入 spawn_blocking，当前桌面应用单用户场景阻塞影响有限
  - M3 (Sprint 2): 添加解压前清理逻辑，防止状态不一致
