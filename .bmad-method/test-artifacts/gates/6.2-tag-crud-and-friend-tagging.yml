concern_items:
  - id: P2-F1
    severity: medium
    location: "db/models.rs:308,333-334,339"
    description: |
      update_tag 和 delete_tag 使用 AppError::NapCat 变体处理标签错误
      （"标签不存在"、"系统标签不可删除"），错误 Display 输出为
      "NapCat 错误: 标签不存在: 5" — 语义不匹配导致用户困惑。
    recommendation: |
      在 errors.rs 新增专用变体：
      ```rust
      #[error("标签错误: {0}")]
      Tag(String),
      ```
      将 db/models.rs 中标签相关错误改为 AppError::Tag(...)。
    blocking: false

  - id: P2-F2
    severity: medium
    location: "TagManager.tsx:63-87"
    description: |
      "新建标签" Button 组件嵌套在外层 <button>（折叠切换器）内部，
      形成 <button><button></button></button> 结构。
      虽然 e.stopPropagation() 防止冒泡，但违反 HTML 规范（嵌套交互元素），
      影响屏幕阅读器等辅助技术的正确解析。
    recommendation: |
      将外层折叠触发器改为非交互元素：
      ```tsx
      <div
        role="button"
        tabIndex={0}
        onClick={() => setCollapsed(!collapsed)}
        onKeyDown={(e) => e.key === 'Enter' && setCollapsed(!collapsed)}
        className="..."
      >
      ```
      或将 "新建标签" 按钮移出折叠触发区域。
    blocking: false

advisory_items:
  - id: P3-F1
    severity: low
    location: "FriendTagPopover.tsx:36-46"
    description: |
      selectedIds 由 useMemo(friendTags) 派生。快速连续切换两个标签时，
      第二次 toggle 基于旧 friendTags 计算 next（第一次 setFriendTags 尚未完成），
      导致第一次变更被第二次覆盖。正常使用概率低。
    recommendation: "使用 useState 维护本地乐观状态，setFriendTags 成功后与 store 同步"
    blocking: false

