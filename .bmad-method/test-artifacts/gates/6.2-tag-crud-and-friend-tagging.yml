  签名合规，serde camelCase 完整，无 println/unwrap/expect。
  前端 3 个新组件遵循项目模式（Zustand/shadcn/CSS变量/toast），
  TagEditDialog 使用 key 重挂载模式（避免 useEffect+setState），FriendTagPopover
