concern_items:
  - id: P2-F1
    severity: medium
    location: "TauriEventProvider.tsx:25-29"
    description: |
      回赞失败时前端不刷新名额数据。当 send_like 失败但 try_consume_quota 已成功消耗名额时
      (skipped=false, success=false)，前端不调用 fetchDailyStats()，导致仪表盘名额显示陈旧数据。
    recommendation: |
      将条件从 `result.success` 改为 `!result.skipped`，确保名额已消耗的场景都触发刷新：
      ```typescript
      if (!result.skipped) {
        fetchDailyStats();
      }
      ```
    blocking: false

