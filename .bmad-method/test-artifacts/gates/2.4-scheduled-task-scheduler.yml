# Issues Summary
issues:
  high: 0
  medium: 0
  low: 5

low_issues:
  - id: L1
    title: "build_cron_expr 仅处理整小时时区偏移"
    file: "engine/scheduler.rs:39-47"
    blocking: false
    recommendation: |
      offset_hours = offset_secs / 3600 使用整数除法。
      UTC+5:30（印度）、UTC+5:45（尼泊尔）等非整小时时区会产生错误的 cron 表达式。
      目标用户为中国（UTC+8，整小时），风险极低。
      建议添加注释说明此限制，或后续支持分钟级偏移。
  - id: L2
    title: "build_status_from 硬编码 is_running_batch: false"
    file: "engine/scheduler.rs:281"
    blocking: false
    recommendation: |
      start/pause/resume/reschedule 发出的 engine:status-changed 事件中
      is_running_batch 永远为 false。get_engine_status 命令正确地从 AtomicBool
      补丁此值，但事件消费者可能被误导。
      建议传入 BatchLikeRunning 引用，或在文档/注释中说明此限制。
  - id: L3
    title: "schedule_hour/schedule_minute 无输入验证"
    file: "engine/scheduler.rs:113-146"
    blocking: false
    recommendation: |
      reschedule() 接受任意 u32 值，无 hour < 24 或 minute < 60 校验。
      无效值会在 Job::new_async 的 cron 解析时报错，但错误信息晦涩。
      建议在 reschedule 入口添加显式验证，返回用户友好的错误信息。
  - id: L4
    title: "窗口关闭时未显式 shutdown 调度器"
    file: "lib.rs:87-104"
    blocking: false
    recommendation: |
      on_window_event 停止了 NapCat 进程但未调用 scheduler.shutdown().await。
      实际无影响（进程退出时所有 tokio 任务自动取消），但显式清理更规范。
      可在后续 Story 3.x（系统托盘/进程管理）一并处理。
  - id: L5
    title: "start_batch_like 命令的 like_type 为 scheduled 而非 manual"
    file: "commands/like.rs:35"
    blocking: false
    preexisting: true
    recommendation: |
      Story 2.3 遗留问题。手动触发的批量点赞标记为 "scheduled" 而非 "manual"，
      统计数据无法区分手动与定时执行。建议后续修正为 "manual"。

