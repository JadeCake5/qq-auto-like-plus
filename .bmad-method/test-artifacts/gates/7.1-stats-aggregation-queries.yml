advisory_items:
  - id: P3-F1
    severity: low
    location: "stats/queries.rs:82-97 (get_daily_stats_range)"
    description: |
      Weekly/Monthly 日期缺失不补零。`get_hourly_stats` 正确地为 0-23 小时
      补零（lines 67-73），但 `get_daily_stats_range` 仅返回有数据的日期。
      7 天范围内若有 3 天无点赞记录，则仅返回 3 个数据点而非 7 个。
      Story 7.2 图表渲染可能出现 X 轴日期跳跃。
    recommendation: |
      方案 A: 在 Rust 侧补零（类似 hourly 逻辑，遍历日期范围填充缺失日）
      方案 B: 在 Story 7.2 前端图表组件中处理日期缺口
      建议在 Story 7.2 创建时明确标注此行为。
    blocking: false

  - id: P3-F2
    severity: low
    location: "stores/useStatsStore.ts:40-67,86-95"
    description: |
      `isLoading` 竞态条件。`fetchDailyStats`/`fetchWeeklyStats`/`fetchMonthlyStats`
      各自独立操作 `isLoading` 布尔值，但 `setPeriod()` 串行调用 fetch → 再
      Promise.all([typeRatio, friendRanking])，后两者不操作 isLoading。
      用户快速切换 period 时，前一个 setPeriod 可能仍在飞行中，无取消机制。
    recommendation: |
      考虑使用请求计数器或在 setPeriod 中统一管理 isLoading
      生命周期（开始设 true，所有 fetch 完成后设 false），
      或使用 AbortController 模式取消过时请求。
    blocking: false

info_items:
