      store 未暴露 error 状态字段，也未触发 toast。Story 7.2 UI 层
      将无法感知后端查询失败。建议添加 `error: string | null` 状态字段。
    blocking: false

  - id: P4-I2
    location: "commands/stats.rs:11"
    description: |
      `date_range_for_period` 的 `_` 分支静默回退为 "week"（6 天）。
      若前端传入非法 period 值不会报错，也无 tracing 日志。
      建议添加 `tracing::warn!` 或返回错误。
    blocking: false

