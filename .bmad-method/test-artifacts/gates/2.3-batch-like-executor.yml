# Issues Summary
issues:
  high: 0
  medium: 1
  low: 4

medium_issues:
  - id: M1
    title: "名额在 API 调用前预消耗 — 失败时浪费名额"
    file: "engine/like_executor.rs:111-133"
    blocking: false
    recommendation: |
      当前流程: try_consume_quota_for_date → send_like → record_like
      如果 send_like 失败（如 NapCat 崩溃），名额已被扣减但实际未点赞成功。
      若 NapCat 在第 10 个好友后崩溃，剩余 40 个好友的名额全部浪费。
      建议之一：添加连续失败检测（3-5 次连续 API 失败后提前终止批量流程）。
      建议之二：改为 API 成功后再消耗名额（当前 AtomicBool 单线程保护下无竞态风险）。

low_issues:
  - id: L1
    title: "AppError::NapCat 用于 Mutex PoisonError — 语义不精确"
    file: "engine/like_executor.rs:44,64,93,112,156"
    blocking: false
    recommendation: |
      db.lock().map_err(|e| AppError::NapCat(e.to_string())) 将 Mutex 中毒错误
      包装为 NapCat 错误。Dev Notes 已提及。建议后续添加 AppError::LockError(String)。
  - id: L2
    title: "engine/mod.rs re-exports 产生 unused warnings"
    file: "engine/mod.rs:4-5"
    blocking: false
    recommendation: |
      pub use quota::QuotaStatus 和 pub use like_executor::{...} 未被消费。
      将在后续 story 使用时自动消除。
  - id: L3
    title: "has_liked_today 边界精度 — <= 23:59:59 vs < next_date"
    file: "db/models.rs:221"
    blocking: false
    recommendation: |
      使用 created_at <= '{date} 23:59:59' 而非 < '{next_date} 00:00:00'。
      因 SQLite CURRENT_TIMESTAMP 无亚秒精度，功能等价。但 < next_date 更通用。
  - id: L4
    title: "friends.clone() 可优化为 move"
    file: "engine/like_executor.rs:76"
    blocking: false
    recommendation: |
      upsert_friends_batch 在 clone 之前已完成，可改为 let mut shuffled = friends;
      避免一次内存分配。微优化，500 好友约 50KB。

