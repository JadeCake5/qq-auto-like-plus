# Issues Summary
issues:
  high: 0
  medium: 2
  low: 5

medium_issues:
  - id: M1
    title: "has_liked_today 使用 DATE() 函数查询 — 无法利用复合索引"
    file: "db/models.rs:191"
    blocking: false
    recommendation: |
      当前 SQL: WHERE user_id = ?1 AND success = 1 AND DATE(created_at) = ?2
      索引 idx_like_history_user_date 是 (user_id, created_at)，但 DATE() 函数调用
      阻止 SQLite 利用 created_at 部分做索引扫描。Story 2.3 中此函数将被
      每个好友调用（200+ 次/批），随 like_history 数据增长会退化为部分全表扫描。
      建议改为范围查询：
        WHERE user_id = ?1 AND success = 1
          AND created_at >= '{date} 00:00:00'
          AND created_at < '{next_date} 00:00:00'
  - id: M2
    title: "try_consume_quota 中 today() 多次独立调用 — 午夜跨天竞态"
    file: "engine/quota.rs:72, 34-36, 100"
    blocking: false
    recommendation: |
      try_consume_quota 调用链产生 3 次独立 today() 调用：
      1. get_quota_status → ensure_daily_state 内调用 today()
      2. get_quota_status → 读取 state 时调用 today()
      3. try_consume_quota 自身 line 100 调用 today()
      午夜 00:00:00 边界可能导致检查旧日期名额、递增新日期计数。
      概率极低（微秒级窗口），但建议 get_quota_status 和 try_consume_quota
      接受 date: &str 参数，调用者统一获取日期一次传入。

low_issues:
  - id: L1
    title: "record_like Dev Notes 注释与实际行为不一致"
    file: "story Dev Notes line 366"
    blocking: false
    recommendation: |
      Dev Notes 描述 record_like 为"组合操作（记录+消耗名额）"，但实际仅记录历史。
      实现本身是正确的（try_consume_quota 已单独处理名额消耗），仅文档有误导性。
      后续 Story 实现时注意区分 try_consume_quota 和 record_like 的职责。
  - id: L2
    title: "无效 like_type 使用 QuotaExhausted 错误 — 语义不精确"
    file: "engine/quota.rs:93-97"
    blocking: false
    recommendation: |
      无效 like_type 返回 AppError::QuotaExhausted("无效的点赞类型: ...")。
      语义应为参数无效而非名额耗尽。实际影响极低（match 已覆盖所有合法值）。
      建议添加 AppError::InvalidParameter 变体或使用现有 NapCat/OneBot 错误。
  - id: L3
    title: "Story 2.2 新增 models 函数返回 rusqlite::Error 而非 AppError"
    file: "db/models.rs:118, 127, 169, 185"
    blocking: false
    recommendation: |
      ensure_daily_state、increment_daily_count、insert_like_history、has_liked_today
      返回 rusqlite::Error，而 Story 1.2 的函数返回 AppError。
      功能正确（调用方做 .map_err(AppError::Database)），仅一致性问题。
  - id: L4
    title: "quota.rs 关键业务路径缺少 tracing 日志"
    file: "engine/quota.rs"
    blocking: false
    recommendation: |
      try_consume_quota 返回 QuotaExhausted 时无 tracing::warn!，
      record_like 记录失败点赞时无日志。
      建议在名额耗尽和点赞失败路径添加 tracing 日志辅助生产环境排查。
  - id: L5
    title: "21 个 dead_code warnings（9 来自 Story 2.2）"
    file: "多个文件"
    blocking: false
    recommendation: |
      所有 2.2 新增函数/类型尚无运行时调用者（库代码）。
      将在 Story 2.3 批量点赞执行器接入后自然消除。

