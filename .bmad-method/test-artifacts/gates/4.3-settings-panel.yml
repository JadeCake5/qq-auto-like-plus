findings:
  p1: 0
  p2: 1
  p3: 2
  p4: 2
  details:
    - id: P2-F1
      severity: P2
      type: ux
      description: |
        恢复默认 toast 轰炸。resetLikeDefaults 连续调用 5 次 saveConfig，每次独立触发
        toast.success("设置已保存~")，用户一次点击收到 5 条堆叠的相同 toast。
        resetReplyDefaults 同理 5 条，resetEnvDefaults 2 条。视觉噪音严重，看起来像 bug。
      location: "Settings.tsx:85-128 (resetLikeDefaults, resetReplyDefaults, resetEnvDefaults)"
      recommendation: |
        方案 A（推荐）：抽取 saveSilent 函数（不触发 toast），reset 函数内部用 saveSilent
        批量更新，最后手动调一次 toast.success("已恢复默认设置~")。
        方案 B：后端新增 batch_update_config command 接受 key-value 数组，单次 invoke。
        建议在 Story 4.4 或独立 patch 中修复。
    - id: P3-F1
      severity: P3
      type: consistency
      description: |
        useSettingsStore 仍直接调用 invoke() 而非 tauri.ts 封装函数。
        Store 内 fetchConfig (line 16) 用 invoke<ConfigEntry[]>("get_config") 而非 getConfig()，
        updateConfig (line 24) 用 invoke("update_config") 而非 updateConfig from tauri.ts。
        Settings.tsx 本身正确使用了 tauri.ts 封装（updateConfigApi），形成了混合模式。
        延续自 Story 4.1 P3-F1，至今未修复。
      location: "useSettingsStore.ts:16,24-25"
      recommendation: |
        将 store 中的 invoke 调用替换为 tauri.ts 封装函数（getConfig, updateConfig）。
        Settings.tsx 已经不依赖 store.updateConfig（直接用 tauri.ts），所以修改 store
        不影响 Settings 页面。可在 Story 4.4 统一修复。
    - id: P3-F2
      severity: P3
      type: hygiene
      description: |
        label.tsx 第 1 行包含 "use client" 指令，这是 Next.js RSC 特有指令，
        在 Vite + Tauri 应用中无意义。由 shadcn CLI 生成，无功能影响但属于死代码。
      location: "src/components/ui/label.tsx:1"
      recommendation: |
        移除 "use client" 行。影响极小，可在任意后续 Story 中顺手清理。
    - id: P4-F1
      severity: P4
      type: ux
      description: |
        恢复默认按钮无 loading 状态。批量 reset 涉及 2-5 次异步 invoke 调用，
        期间按钮可重复点击。在快速网络下几乎无感知，但理论上存在重复触发风险。
      location: "SettingCard.tsx:27-36; Settings.tsx:85-128"
      recommendation: |
        可添加 isResetting 状态在 reset 执行期间禁用按钮。
        优先级极低，桌面本地 IPC 延迟 <10ms。
    - id: P4-F2
      severity: P4
      type: robustness
      description: |
        uncontrolled Input 的 key prop 重置边界情况。API 地址和 Webhook 端口使用
        key={config.xxx} 的 uncontrolled 模式，若用户正在输入时外部 config:updated 事件
        触发 store 刷新，输入框会因 key 变化重新挂载，丢失用户未提交的输入。
        在单用户桌面应用中极不可能发生（只有本用户在修改设置）。
      location: "Settings.tsx:284,294-297"
      recommendation: |
        如未来出现问题，可改为 controlled input + debounce 模式。
        当前场景下可接受，无需修改。

