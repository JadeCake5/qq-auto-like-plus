concern_items:
  - id: P2-F1
    severity: medium
    location: "commands/friends.rs:36-43"
    description: |
      sync_friends 中直接执行 conn.prepare("SELECT user_id FROM friends") SQL 查询，
      违反架构规则 "db 访问通过 db/models.rs — 不在 commands 或 engine 中直接写 SQL"。
      功能正确但破坏架构一致性，Story 自身 Dev Notes 也明确列出了该规则。
    recommendation: |
      在 db/models.rs 新增提取函数：
      ```rust
      pub fn get_all_friend_ids(conn: &Connection) -> Result<HashSet<i64>, AppError> {
          let mut stmt = conn.prepare("SELECT user_id FROM friends")?;
          let ids = stmt.query_map([], |row| row.get(0))?
              .collect::<Result<HashSet<_>, _>>()?;
          Ok(ids)
      }
      ```
      commands/friends.rs 改为调用 db::models::get_all_friend_ids(&conn)。
    blocking: false

