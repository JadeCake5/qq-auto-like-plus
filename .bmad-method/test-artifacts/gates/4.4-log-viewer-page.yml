findings:
  p1: 0
  p2: 1
  p3: 3
  p4: 2
  details:
    - id: P2-F1
      severity: P2
      type: ux
      description: |
        过滤结果为空时无用户反馈。Logs.tsx:25 空状态判断条件为 entries.length === 0，
        仅在完全无日志时显示空状态。当用户输入搜索关键字或切换级别筛选导致
        filteredEntries 为空（但 entries 不为空）时，VirtualLogList 渲染空白区域，
        无任何"未找到匹配日志"提示。虽然工具栏计数 badge 显示 "0/N" 提供了部分线索，
        但空白区域缺乏明确反馈，用户可能误以为组件异常。
      location: "Logs.tsx:25 (entries.length === 0 条件判断)"
      recommendation: |
        添加第二层空状态：当 entries.length > 0 && filteredEntries.length === 0 时，
        显示"未找到匹配的日志条目"提示（搜索图标 + 柔和文案）。
        示例：
        ```tsx
        {entries.length === 0 ? (
          <EmptyState text="还没有日志记录~运行后会出现在这里" />
        ) : filteredEntries.length === 0 ? (
          <EmptyState text="未找到匹配的日志条目" icon="🔍" />
        ) : (
          <VirtualLogList entries={filteredEntries} />
        )}
        ```
    - id: P3-F1
      severity: P3
      type: performance
      description: |
        getFilteredEntries 无 memoization。Logs.tsx:7 调用模式
        useLogStore((s) => s.getFilteredEntries)() 在每次渲染时执行完整的
        filter + search 迭代（O(n)），并返回新数组引用。由于 Logs 组件同时订阅
        entries（line 6），每条新日志触发 re-render → getFilteredEntries 重算。
        在高频日志场景（如批量点赞期间 100+ 条/秒），filter 计算和新数组分配
        叠加产生不必要开销。虚拟滚动限制了 DOM 更新范围，实际性能影响可控，
        但不够优雅。
      location: "Logs.tsx:7; useLogStore.ts:41-52"
      recommendation: |
        方案 A：在 Logs.tsx 用 useMemo 缓存 filteredEntries，依赖 [entries, filter, searchKeyword]。
        方案 B：将 getFilteredEntries 改为 Zustand 的 computed/derived state（通过 subscribeWithSelector 中间件）。
        优先级中低，当前虚拟滚动已保障渲染性能。
    - id: P3-F2
      severity: P3
      type: performance
      description: |
        addEntry 每次调用复制整个 entries 数组。useLogStore.ts:32
        [...state.entries, entry] 在 MAX_LOG_ENTRIES=2000 时，每条新日志需复制
        2000 个对象引用。超出上限时还会额外 slice()。在高频日志场景中产生 GC 压力。
      location: "useLogStore.ts:31-37"
      recommendation: |
        方案 A：使用 Immer 中间件的 push + splice 代替 spread + slice。
        方案 B：使用环形缓冲区（ring buffer）实现常数时间添加。
        对于 2000 个小对象引用的复制，实际性能影响可忽略。仅在日志量级
        大幅增长时需要优化。
    - id: P3-F3
      severity: P3
      type: ux
      description: |
        清空日志后搜索关键字未重置。clear() 仅 set({ entries: [] })，
        不重置 searchKeyword。加上 LogToolbar Input 是 uncontrolled 组件（无 value prop），
        清空后新到达的日志仍被旧关键字过滤，且搜索框仍显示旧关键字文本。
        用户可能期望"清空"是完全重置。
      location: "useLogStore.ts:38; LogToolbar.tsx:35 (uncontrolled Input)"
      recommendation: |
        方案 A（推荐）：clear() 同时重置 searchKeyword 和 filter：
          clear: () => set({ entries: [], searchKeyword: '', filter: 'all' })
        并将 LogToolbar Input 改为 controlled（value={searchKeyword}）以同步 UI。
        方案 B：保持当前行为但在 UX 文案中说明"清空仅清除日志条目"。
    - id: P4-F1
      severity: P4
      type: style
      description: |
        scrollbar-thin CSS 类未定义。VirtualLogList.tsx:84 使用 className="scrollbar-thin"，
        但 Tailwind CSS 4 无内置 scrollbar 工具类，项目也未安装 scrollbar 插件
        或定义自定义 scrollbar 样式。该类被静默忽略，容器使用浏览器默认滚动条。
        在 Kawaii 暗色主题下，默认亮色滚动条可能视觉突兀。
      location: "VirtualLogList.tsx:84"
      recommendation: |
        添加自定义 CSS 滚动条样式到 index.css（或 Tailwind @utility）：
        .scrollbar-thin::-webkit-scrollbar { width: 6px; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: var(--color-bg-elevated); border-radius: 3px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    - id: P4-F2
      severity: P4
      type: ux
      description: |
        日志消息 truncate 无法查看完整内容。VirtualLogList.tsx:113
        <span className="truncate"> 截断长消息并显示省略号，但无 tooltip、
        点击展开或横向滚动机制查看完整文本。错误堆栈等长消息可能被截断。
      location: "VirtualLogList.tsx:113"
      recommendation: |
        可添加 title={entry.message} 属性提供原生 tooltip，
        或未来迭代中实现点击行展开详情。优先级极低，MVP 可接受。

